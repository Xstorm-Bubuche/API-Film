<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinéAPI – Explorer les films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>

<body>
<header>
  <a class="logo" href="#">Ciné<span>API</span></a>

  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un film…" autocomplete="off">
  </div>

  <nav id="mainNav">
    <button data-type="popular" class="active">Populaires</button>
    <button data-type="top_rated">Top</button>
    <button data-type="upcoming">Bientôt</button>
    <button data-type="now_playing">À l'affiche</button>
    <button data-type="favorites">❤ Favoris</button>
  </nav>
</header>
<main>
  <div class="section-title">
    <span id="sectionLabel">Films populaires</span>
    <span class="count" id="moviesCount" style="display:none"></span>
  </div>

  <div id="moviesContainer">
    <div class="loading"><div class="spinner"></div> Chargement…</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" style="position:relative" id="movieModal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header" id="modalContent"></div>
  </div>
</div>

<!-- JavaScript -->

<script>
const API_BASE = 'http://localhost:8000';
const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
let currentType = 'popular';
let favorites = JSON.parse(localStorage.getItem('cineapi_favs') || '{}');
let searchTimeout = null;

// nav
const labels = {
  popular:     'Films populaires',
  top_rated:   'Meilleurs films',
  upcoming:    'Prochainement',
  now_playing: 'À l\'affiche',
  favorites:   '❤ Mes Favoris',
};

//recup film 
async function fetchMovies(type) {
  setSection(type);
  showLoading();
  try {
    const url = type === 'favorites'
      ? `${API_BASE}/favorites`
      : `${API_BASE}/movies?type=${type}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    const movies = data.results ?? data.favorites ?? [];
    renderMovies(movies);
  } catch (e) {
    showError('Impossible de contacter l\'API.<br>Vérifie que ton serveur PHP tourne sur <code>localhost:8000</code>.');
  }
}

// recherche
async function fetchSearch(q) {
  if (!q.trim()) { fetchMovies(currentType); return; }
  setSection('search', `Résultats pour "${q}"`);
  showLoading();
  try {
    const res = await fetch(`${API_BASE}/movies/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    renderMovies(data.results ?? []);
  } catch (e) {
    showError('Impossible de contacter l\'API.');
  }
}

// détail des films
async function fetchDetail(id) {
  try {
    const res = await fetch(`${API_BASE}/movies/${id}`);
    const movie = await res.json();
    openModal(movie);
  } catch (e) {
    showToast('Erreur lors du chargement du détail', 'error');
  }
}

// affichage des films
function renderMovies(movies) {
  const container = document.getElementById('moviesContainer');
  const count = document.getElementById('moviesCount');

  if (!movies.length) {
    container.innerHTML = `<div class="msg-box"><span class="icon">🎬</span><p>Aucun film trouvé.</p></div>`;
    count.style.display = 'none';
    return;
  }

  count.textContent = `${movies.length} film${movies.length > 1 ? 's' : ''}`;
  count.style.display = '';

  container.innerHTML = '';
  movies.forEach((movie, i) => {
    const card = createCard(movie, i);
    container.appendChild(card);
  });
}

// création de la carte film
function createCard(movie, index) {
  const div = document.createElement('div');
  div.className = 'movie-card';
  div.style.animationDelay = `${Math.min(index * 30, 400)}ms`;

  const isFav = !!favorites[movie.id];
  const year = (movie.release_date || movie.added_at || '').slice(0, 4);
  const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '—';

  div.innerHTML = `
    ${movie.poster_path
      ? `<img class="poster" src="${IMG_BASE}${movie.poster_path}" alt="${movie.title}" loading="lazy">`
      : `<div class="no-poster">🎬</div>`}
    <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${movie.id}" title="${isFav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">
      ${isFav ? '❤' : '🤍'}
    </button>
    <div class="info">
      <div class="title" title="${movie.title}">${movie.title}</div>
      <div class="meta">
        <span class="year">${year}</span>
        <span class="rating">⭐ ${rating}</span>
      </div>
    </div>`;

  div.querySelector('.fav-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFavorite(movie, e.currentTarget);
  });

  div.addEventListener('click', () => fetchDetail(movie.id));
  return div;
}

// favoris
async function toggleFavorite(movie, btn) {
  const id = movie.id;
  if (favorites[id]) {
    // Supprimer
    try {
      await fetch(`${API_BASE}/favorites/${id}`, { method: 'DELETE' });
    } catch {}
    delete favorites[id];
    btn.textContent = '🤍';
    btn.classList.remove('active');
    showToast(`"${movie.title}" retiré des favoris`, 'info');
  } else {
    // Ajouter
    try {
      await fetch(`${API_BASE}/favorites`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: movie.id,
          title: movie.title,
          poster_path: movie.poster_path,
          vote_average: movie.vote_average,
        })
      });
    } catch {}
    favorites[id] = true;
    btn.textContent = '❤';
    btn.classList.add('active');
    showToast(`"${movie.title}" ajouté aux favoris ❤`, 'success');
  }
  localStorage.setItem('cineapi_favs', JSON.stringify(favorites));
  if (currentType === 'favorites') fetchMovies('favorites');
}

// détail de la carte film
function openModal(movie) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  const year = (movie.release_date || '').slice(0, 4);
  const runtime = movie.runtime ? `${movie.runtime} min` : '';
  const genres = (movie.genres || []).map(g => g.name).join(', ');

  content.innerHTML = `
    ${movie.poster_path
      ? `<img class="modal-poster" src="${IMG_BASE}${movie.poster_path}" alt="${movie.title}">`
      : `<div class="modal-poster" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem">🎬</div>`}
    <div class="modal-body">
      <div class="modal-title">${movie.title}</div>
      ${movie.tagline ? `<div class="modal-tagline">"${movie.tagline}"</div>` : ''}
      <p class="modal-overview">${movie.overview || 'Aucune description disponible.'}</p>
      <div class="modal-meta">
        ${year ? `<span class="badge">${year}</span>` : ''}
        ${runtime ? `<span class="badge">⏱ ${runtime}</span>` : ''}
        ${movie.vote_average ? `<span class="badge accent">⭐ ${movie.vote_average.toFixed(1)}</span>` : ''}
        ${genres ? `<span class="badge">${genres}</span>` : ''}
        ${movie.original_language ? `<span class="badge">${movie.original_language.toUpperCase()}</span>` : ''}
      </div>
    </div>`;

  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// fermeture des detail carte film
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({ target: document.getElementById('modalOverlay') }); });

function showLoading() {
  document.getElementById('moviesContainer').innerHTML = `<div class="loading"><div class="spinner"></div> Chargement…</div>`;
  document.getElementById('moviesCount').style.display = 'none';
}

function showError(msg) {
  document.getElementById('moviesContainer').innerHTML = `
    <div class="msg-box"><span class="icon">⚠️</span>
    <p>${msg}</p></div>`;
  document.getElementById('moviesCount').style.display = 'none';
}

function setSection(type, label) {
  currentType = type;
  document.getElementById('sectionLabel').textContent = label || labels[type] || type;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`nav button[data-type="${type}"]`);
  if (btn) btn.classList.add('active');
}

let toastTimer;
function showToast(msg, type = 'info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const icons = { success: '✅', error: '❌', info: '💡' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 3000);
}


document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    fetchMovies(btn.dataset.type);
  });
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value;
  searchTimeout = setTimeout(() => {
    if (q.length >= 2) fetchSearch(q);
    else if (q.length === 0) fetchMovies(currentType);
  }, 400);
});

fetchMovies('popular');
</script>

<!-- CSS -->

<style>

    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #e8c84a;

    --text: #f0ede8;
    --muted: #7a7a8a;

  }

  .logo span { color: var(--accent2); }

  @keyframes fadeUp {

  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-body { flex: 1; }

  .route span { color: rgba(240,237,232,0.5); }

    background: linear-gradient(135deg, rgba(232,200,74,0.08), rgba(255,107,53,0.05));

    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    font-size: 0.88rem;
    line-height: 1.6;
  }
  .setup-notice strong { color: var(--accent); }

  @media (max-width: 700px) {
    header { padding: 0 1rem; flex-wrap: wrap; height: auto; gap: 0.5rem; padding: 0.75rem 1rem; }
    .search-wrap { max-width: 100%; margin: 0; order: 3; flex: 1 1 100%; }
    nav { order: 2; }
    main { padding: 1.5rem 1rem; }
    .modal-header { flex-direction: column; }
    .modal-poster { width: 100px; }
  }
</style>
